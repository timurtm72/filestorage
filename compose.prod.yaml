x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build: .
    container_name: filestorage-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: r2dbc:postgresql://postgres:5432/${DATABASE_NAME:-filestorage}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-filestorage}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env}
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=${JAVA_MAX_RAM_PERCENTAGE:-75}
      FILE_STORAGE_ROOT: /data/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-1GB}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?Set APP_PUBLIC_URL in .env}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_AUTH: ${MAIL_AUTH:-true}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-true}
      MAIL_SSL: ${MAIL_SSL:-false}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      SESSION_HOURS: ${SESSION_HOURS:-168}
      VERIFICATION_HOURS: ${VERIFICATION_HOURS:-24}
      LOGIN_VERIFICATION_MINUTES: ${LOGIN_VERIFICATION_MINUTES:-15}
      SECURE_COOKIE: ${SECURE_COOKIE:-false}
    expose:
      - "8081"
    volumes:
      - ${UPLOADS_PATH:-./data/uploads}:/data/uploads
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/api/auth/csrf"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *logging

  frontend:
    build: ./frontend
    container_name: filestorage-frontend
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:?Set TAILSCALE_IP in .env}:${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *logging

networks:
  app-network:
    external: true
