services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: filestorage
      POSTGRES_USER: filestorage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filestorage -d filestorage"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: r2dbc:postgresql://postgres:5432/filestorage
      DATABASE_USERNAME: filestorage
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      FILE_STORAGE_ROOT: /data/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-1GB}
    volumes:
      - ${UPLOADS_PATH:-./data/uploads}:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  postgres-data:
