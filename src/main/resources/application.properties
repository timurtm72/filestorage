spring.application.name=FileStorage
spring.r2dbc.url=${DATABASE_URL:r2dbc:postgresql://localhost:5433/filestorage}
spring.r2dbc.username=${DATABASE_USERNAME:filestorage}
spring.r2dbc.password=${DATABASE_PASSWORD:filestorage}
spring.sql.init.mode=always

spring.webflux.multipart.max-in-memory-size=1MB
spring.webflux.multipart.max-disk-usage-per-part=${MAX_UPLOAD_SIZE:1GB}
spring.webflux.multipart.max-parts=2

app.storage.file-root=${FILE_STORAGE_ROOT:data/uploads}
server.port=${SERVER_PORT:8081}
server.forward-headers-strategy=framework

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.auth.public-url=${APP_PUBLIC_URL:http://localhost:5173}
app.auth.mail-from=${MAIL_FROM:}
app.auth.session-hours=${SESSION_HOURS:168}
app.auth.verification-hours=${VERIFICATION_HOURS:24}
app.auth.login-verification-minutes=${LOGIN_VERIFICATION_MINUTES:15}
app.auth.mail-enabled=${MAIL_ENABLED:false}
app.auth.secure-cookie=${SECURE_COOKIE:false}
